<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Chat V2 - 雙向翻譯 & 在線協作</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIumYpuaZguevsumit+i聊天室 V2IiwKICAic2hvcnRfbmFtZSI6ICLni6zoipLoob3oiYUiLAogICJzdGFydF91cmwiOiAiLi9pbmRleC5odG1sIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZjBmOWZmIiwKICAidGhlbWVfY29sb3IiOiAiIzNiODJmNiIKfQ==">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg-glass: rgba(255, 255, 255, 0.98); }
        body {
            font-family: 'Outfit', 'Microsoft JhengHei', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            height: 100vh; overflow: hidden; margin: 0; padding: 0;
            transition: all 0.3s ease;
        }
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 15px 60px -15px rgba(0, 0, 0, 0.08);
        }
        .message-bubble { max-width: 80%; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        #name-modal { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); z-index: 2000; }
        .flash-active { animation: ring-pulse 1s infinite alternate !important; }
        @keyframes ring-pulse { 
            from { box-shadow: inset 0 0 0px transparent; } 
            to { box-shadow: inset 0 0 80px rgba(239, 68, 68, 0.6); } 
        }
        
        #super-alert {
            position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
            background: #ef4444; color: white; padding: 18px 40px; border-radius: 9999px;
            font-weight: 800; font-size: 1.15rem; box-shadow: 0 30px 60px rgba(239, 68, 68, 0.4);
            z-index: 3000; transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex; align-items: center; gap: 15px; cursor: pointer; border: 2px solid white;
        }
        #super-alert.active { top: 40px; }

        .date-divider {
            display: flex; align-items: center; text-align: center; color: #94a3b8; font-size: 11px; font-weight: 700; margin: 2rem 0;
        }
        .date-divider::before, .date-divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
        .date-divider span { padding: 0 1.5rem; letter-spacing: 0.1em; }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; margin-right: 6px; }
    </style>
    <!-- Dynamic Favicon Container -->
    <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
</head>
<body class="flex items-center justify-center p-2 lg:p-4">

    <!-- Alert Banner -->
    <div id="super-alert" onclick="dismissAlert()">
        <span class="text-3xl animate-bounce">📢</span>
        <div class="text-left">
            <div class="leading-tight">有新對話！ (新着)</div>
            <div id="alert-sender" class="text-[10px] font-black opacity-90 uppercase tracking-widest">Incoming from: ...</div>
        </div>
    </div>

    <!-- Name Modal -->
    <div id="name-modal" class="fixed inset-0 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl space-y-8 border border-slate-100">
            <div class="text-center space-y-2">
                <div class="text-6xl mb-4">👤</div>
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">歡迎進入聊天室</h2>
                <h3 class="text-sm font-bold text-blue-500 italic uppercase tracking-widest leading-tight italic">Welcome to the Chat</h3>
            </div>
            <div class="space-y-4">
                <input type="text" id="modal-user-name" placeholder="您的名字 / お名前" 
                    class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-5 text-lg font-bold outline-none focus:border-blue-500 transition-all text-slate-700"
                    onkeydown="if(event.key==='Enter') saveNameFromModal()">
                <button onclick="saveNameFromModal()" 
                    class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-lg shadow-xl shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">
                    進入對話 / 参加する
                </button>
            </div>
        </div>
    </div>

    <div id="main-frame" class="w-full max-w-6xl h-full flex flex-col glass-panel rounded-[3rem] overflow-hidden relative border border-white/60">
        <!-- Header -->
        <header class="p-4 lg:p-8 border-b border-slate-100 flex justify-between items-center bg-white/40">
            <div class="flex items-center gap-5">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl shadow-xl ring-4 ring-blue-50">🌍</div>
                <div>
                    <h1 class="text-xl font-black text-slate-800 tracking-tighter">雙向翻譯聊天室 <span class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded-md text-[10px] ml-1 uppercase">V2 PRO</span></h1>
                    <div class="flex items-center gap-3 mt-1">
                        <div class="flex items-center text-[10px] font-bold text-slate-400">
                            <div class="online-dot animate-pulse"></div>
                            線上人員 / 接続中：<span id="online-list" class="text-emerald-500 ml-1">...</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-4 text-right">
                <div class="hidden sm:block">
                    <div id="display-user-name" class="text-sm font-black text-blue-600 uppercase">...</div>
                    <button onclick="promptNameChange()" class="text-[10px] font-bold text-slate-400 hover:text-blue-500 underline uppercase tracking-tighter">Modify / 変更</button>
                </div>
                <button onclick="clearChat()" class="p-3 bg-red-50 text-red-300 hover:text-red-500 rounded-2xl transition-all shadow-sm">🗑️</button>
            </div>
        </header>

        <!-- Chat Container -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 lg:p-10 space-y-6 scrollbar-hide bg-gradient-to-b from-white to-slate-50/30">
            <!-- Messages go here -->
        </div>

        <!-- Input Area -->
        <section class="p-4 lg:p-8 bg-white border-t border-slate-100">
            <div id="live-trans" class="mb-4 px-5 py-3 bg-slate-800 text-white rounded-2xl shadow-2xl text-xs font-bold hidden flex items-center gap-3">
                <span class="bg-blue-600 px-2 py-0.5 rounded text-[9px] uppercase tracking-widest">Translate</span>
                <span id="live-trans-text">...</span>
            </div>
            <div class="flex gap-4 items-end bg-slate-50 rounded-[2rem] p-3 border border-slate-100 focus-within:ring-4 focus-within:ring-blue-50 transition-all">
                <textarea id="msg-input" 
                    class="flex-1 bg-transparent border-none outline-none p-3 text-base font-bold text-slate-700 resize-none max-h-32 min-h-[56px] placeholder:text-slate-300"
                    placeholder="輸入後按 Enter 傳送 / 入力して送信..." rows="1" onkeydown="handleKey(event)" oninput="handleInput()"></textarea>
                <button onclick="sendMessage()" id="send-btn"
                    class="w-16 h-16 bg-blue-600 text-white rounded-[1.5rem] flex items-center justify-center shadow-2xl shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.6" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
            <p class="text-[9px] text-center text-slate-300 mt-5 font-bold uppercase tracking-[0.4em]">Optimized Real-time Sync Engine</p>
        </section>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyCqkSEg2FfwdF4yFjZToMaRMbwpRu1P6z0E4uLLNzaxzyT_g4lPjI5RdqyIUn3Kqhy/exec";
        // 重返 V1 兼容的金鑰，確保 V1/V2 可以互相對話與提醒
        const KEY_DATA = "FB_CHAT_DYN_v9_BADGE"; 
        const PRES_PREFIX = "PRES_v2_";
        
        let messages = []; let isSending = false; let lastSyncHash = ""; let transTimer = null; let lastTrans = null;
        let userName = localStorage.getItem('fb_user_v2') || localStorage.getItem('fb_user') || ""; 
        let originalTitle = document.title; let flashTimer = null; let isTabActive = true;

        document.addEventListener("visibilitychange", () => { isTabActive = (document.visibilityState==='visible'); if(isTabActive) dismissAlert(); });
        window.onfocus = () => { isTabActive = true; dismissAlert(); }; window.onblur = () => isTabActive = false;

        function updateFavicon(hasNew) {
            const favicon = document.getElementById('favicon');
            if (hasNew) {
                favicon.href = "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🌍</text><circle cx=%2280%22 cy=%2220%22 r=%2225%22 fill=%22red%22 stroke=%22white%22 stroke-width=%225%22/></svg>";
                if ('setAppBadge' in navigator) navigator.setAppBadge();
            } else {
                favicon.href = "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>";
                if ('clearAppBadge' in navigator) navigator.clearAppBadge();
            }
        }

        function triggerAlert(sender) {
            if (isTabActive) return;
            updateFavicon(true);
            if (!flashTimer) {
                let show = true; 
                flashTimer = setInterval(() => { 
                    document.title = show ? "►►► 🔔 新訊息 ◄◄◄" : originalTitle; 
                    show = !show; 
                }, 600);
            }
            document.body.classList.add('flash-active');
            document.getElementById('alert-sender').innerText = `SEND BY: ${sender}`;
            document.getElementById('super-alert').classList.add('active');
        }

        function dismissAlert() {
            clearInterval(flashTimer); flashTimer = null; document.title = originalTitle;
            document.body.classList.remove('flash-active');
            document.getElementById('super-alert').classList.remove('active');
            updateFavicon(false);
        }

        if (!userName) document.getElementById('name-modal').classList.remove('hidden'); else document.getElementById('display-user-name').innerText = userName;

        async function translate(text) {
            if (!text) return ""; const isJp = /[\u3040-\u309F\u30A0-\u30FF]/.test(text); const sl = isJp ? 'ja' : 'zh-TW'; const tl = isJp ? 'zh-TW' : 'ja';
            try { const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`); const json = await res.json(); return { result: json[0].map(p => p[0]).join(''), origin: text }; } catch (e) { return { result: "...", origin: text }; }
        }

        function handleInput() {
            const el = document.getElementById('msg-input');
            const live = document.getElementById('live-trans');
            const liveText = document.getElementById('live-trans-text');
            const text = el.value.trim();
            if (el.scrollHeight > el.clientHeight) { el.style.height = 'auto'; el.style.height = (el.scrollHeight) + 'px'; }
            if (!text) { live.classList.add('hidden'); lastTrans = null; return; }
            clearTimeout(transTimer); transTimer = setTimeout(async () => {
                if (el.value.trim() === text) { const t = await translate(text); lastTrans = t; liveText.innerText = t.result; live.classList.remove('hidden'); }
            }, 250);
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input'); const text = input.value.trim(); if (!text || isSending) return; isSending = true;
            document.getElementById('live-trans').classList.add('hidden');
            let t = (lastTrans && lastTrans.origin === text) ? lastTrans : await translate(text);
            const msg = { user: userName, text: text, trans: t.result, time: Date.now() };
            const updated = [...messages, msg].slice(-100);
            updateUI(updated, false); input.value = ""; input.style.height = "auto"; isSending = false; lastTrans = null;
            postData(KEY_DATA, updated);
        }

        function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

        function updateUI(newList, playAlert = true) {
            const last = newList[newList.length - 1]; const current = messages[messages.length - 1]; const isNew = last && (!current || last.time > current.time);
            if (JSON.stringify(newList) === lastSyncHash) return;
            lastSyncHash = JSON.stringify(newList);
            if (playAlert && isNew && last.user !== userName) triggerAlert(last.user);
            messages = newList;
            const container = document.getElementById('chat-messages'); container.innerHTML = "";
            let lastDate = "";
            messages.forEach(m => {
                const dateStr = new Date(m.time).toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });
                if (dateStr !== lastDate) {
                    const div = document.createElement('div'); div.className = "date-divider text-center"; div.innerHTML = `<span>${dateStr}</span>`;
                    container.appendChild(div); lastDate = dateStr;
                }
                const isMe = m.user === userName;
                const bubble = document.createElement('div'); bubble.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                bubble.innerHTML = `<div class="message-bubble flex flex-col ${isMe ? 'items-end' : 'items-start'}"><div class="flex items-center gap-2 mb-1 px-3"><span class="text-[9px] font-black text-slate-400 tracking-tight uppercase">${m.user}</span><span class="text-[8px] text-slate-300">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span></div><div class="p-4 rounded-3xl shadow-sm border ${isMe ? 'bg-blue-600 text-white rounded-tr-none border-blue-500 shadow-blue-100/50' : 'bg-white text-slate-700 rounded-tl-none border-slate-100'}"><div class="text-sm font-semibold tracking-tight whitespace-pre-wrap">${m.text}</div><div class="mt-2 pt-2 border-t ${isMe ? 'border-white/20' : 'border-slate-50 text-blue-600'}"><div class="text-[11px] font-bold italic opacity-90">${m.trans}</div></div></div></div>`;
                container.appendChild(bubble);
            });
            container.scrollTop = container.scrollHeight;
        }

        async function sync() {
            try {
                const res = await fetch(GAS_URL); const cloud = await res.json();
                if (cloud && cloud[KEY_DATA]) updateUI(cloud[KEY_DATA]);
                const now = Date.now(); const onlineUsers = []; const uniqueUsers = new Set();
                Object.keys(cloud).forEach(k => {
                    if (k.startsWith(PRES_PREFIX)) {
                        if (now - cloud[k] < 30000) {
                            const name = k.replace(PRES_PREFIX, "");
                            if (!uniqueUsers.has(name)) { uniqueUsers.add(name); onlineUsers.push(name); }
                        }
                    }
                });
                onlineUsers.sort();
                document.getElementById('online-list').innerText = onlineUsers.length > 0 ? onlineUsers.join(', ') : '無人';
            } catch (e) { console.error(e); }
        }

        async function heartbeat() { if (userName) postData(PRES_PREFIX + userName, Date.now()); }
        function postData(id, data) {
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ id, data }), headers: { "Content-Type": "text/plain;charset=utf-8" } });
        }

        function saveNameFromModal() { const val = document.getElementById('modal-user-name').value.trim(); if (!val) return; userName = val; localStorage.setItem('fb_user_v2', userName); document.getElementById('display-user-name').innerText = userName; document.getElementById('name-modal').classList.add('hidden'); heartbeat(); }
        function promptNameChange() { const newVal = prompt("新的姓名 / 新しい名前：", userName); if (newVal && newVal.trim()) { userName = newVal.trim(); localStorage.setItem('fb_user_v2', userName); document.getElementById('display-user-name').innerText = userName; updateUI(messages, false); heartbeat(); } }
        function clearChat() { if (!confirm("清空歷史紀錄嗎？ / 履歴を削除しますか？")) return; postData(KEY_DATA, []); updateUI([]); }

        setInterval(sync, 4000); setInterval(heartbeat, 10000); sync(); heartbeat();
    </script>
</body>
</html>
