<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Chat V3.3.3 PRO - 智慧提醒修正</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg-glass: rgba(255, 255, 255, 0.98); }
        body { font-family: 'Outfit', 'Microsoft JhengHei', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%); height: 100vh; overflow: hidden; margin: 0; }
        .glass-panel { background: var(--bg-glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.7); box-shadow: 0 15px 60px -15px rgba(0, 0, 0, 0.08); }
        .message-bubble { max-width: 85%; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 4000; }
        .sidebar-active { transform: translateX(0) !important; }
        .room-item.active { background: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; }
        .online-status { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .status-offline { background: #cbd5e1; }
        #noti-banner { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 12px 24px; border-radius: 99px; font-weight: bold; font-size: 14px; z-index: 6000; transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3); }
        #noti-banner.active { top: 20px; }
        .unread-badge { background: #ef4444; color: white; font-size: 9px; padding: 2px 6px; border-radius: 99px; font-weight: 900; }
    </style>
</head>
<body class="flex items-center justify-center p-0 lg:p-4 overflow-hidden">

    <div id="noti-banner" onclick="this.classList.remove('active')">🔔 新訊息！</div>
    <div id="overlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[3500] hidden" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 bottom-0 w-72 bg-white border-r -translate-x-full shadow-2xl flex flex-col">
        <div class="p-8 border-b flex justify-between items-center bg-white sticky top-0">
            <h2 class="text-xl font-black text-slate-800 flex items-center gap-2"><span>💬</span> 成員名單 / 履歴</h2>
        </div>
        <div class="flex-1 overflow-y-auto py-2 scrollbar-hide">
            <div onclick="switchRoom('ALL')" id="room-ALL" class="room-item p-5 flex items-center justify-between cursor-pointer active font-bold">
                <div class="flex items-center gap-4">
                    <span class="text-lg">🌍</span>
                    <div class="text-sm">全體廣播 / 全員</div>
                </div>
                <div id="unread-ALL" class="unread-badge hidden">0</div>
            </div>
            <div class="px-6 py-4 mt-4 border-t">
                <h3 class="text-[10px] font-black text-slate-300 uppercase mb-4 tracking-widest flex justify-between items-center">
                    <span>私聊通訊錄</span>
                    <button onclick="clearHistoryUsers()" class="hover:text-red-400">清空</button>
                </h3>
                <div id="dm-list" class="space-y-1"></div>
            </div>
        </div>
        <div class="p-6 border-t bg-slate-50 flex items-center justify-between">
            <div>
                <div id="my-name-display" class="text-xs font-black text-slate-800 uppercase leading-none">...</div>
                <div class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter mt-1">My Account</div>
            </div>
            <button onclick="promptNameChange()" class="px-3 py-1.5 bg-white border rounded-lg text-xs font-bold shadow-sm">更名</button>
        </div>
    </aside>

    <div id="name-modal" class="fixed inset-0 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl space-y-8 text-center border">
            <h2 class="text-2xl font-black text-slate-800">歡迎登入 / ログイン</h2>
            <input type="text" id="modal-user-name" placeholder="您的名字 / お名前" class="w-full bg-slate-50 border-2 rounded-2xl px-6 py-4 text-center text-lg font-bold outline-none focus:border-blue-500">
            <button onclick="saveNameFromModal()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-lg shadow-xl hover:bg-blue-700 transition-all">進入對話</button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-frame" class="w-full max-w-6xl h-full flex flex-col glass-panel rounded-none lg:rounded-[3rem] overflow-hidden relative border border-white/60">
        <header class="p-4 lg:p-6 border-b flex justify-between items-center bg-white/60">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" id="menu-btn" class="w-12 h-12 flex items-center justify-center bg-white border text-slate-600 rounded-2xl shadow-sm relative transition-all active:scale-95">
                    ☰
                    <div id="menu-dot" class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white hidden"></div>
                </button>
                <div>
                    <h1 class="text-lg font-black text-slate-800" id="active-room-title">全體廣播 / 全員</h1>
                    <div id="sync-status" class="text-[9px] font-bold text-slate-400 mt-0.5 flex items-center gap-1 uppercase tracking-tighter">
                        <div class="online-dot grayscale opacity-50"></div> 連線中...
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span class="bg-blue-600 text-white px-2 py-0.5 rounded text-[10px] font-black tracking-widest uppercase shadow-lg">V3.3.3 PRO</span>
            </div>
        </header>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 lg:p-10 space-y-4 scrollbar-hide"></div>

        <section class="p-4 lg:p-6 bg-white border-t backdrop-blur-md">
            <div id="trans-preview" class="mb-3 px-4 py-2 bg-slate-800 text-white rounded-xl text-[11px] font-bold hidden animate-fadeIn shadow-lg">
                <span id="trans-preview-text">...</span>
            </div>
            <div class="flex gap-4 items-end bg-slate-100/50 rounded-[2rem] p-3 border focus-within:bg-white transition-all">
                <textarea id="msg-input" oninput="handlePreview()" class="flex-1 bg-transparent border-none outline-none p-3 text-base font-bold text-slate-700 resize-none max-h-32 min-h-[56px]" placeholder="輸入訊息 / メッセージ..."></textarea>
                <button onclick="sendMessage()" class="w-14 h-14 bg-blue-600 text-white rounded-[1.2rem] flex items-center justify-center shadow-lg hover:bg-blue-700 active:scale-95 transition-all">➤</button>
            </div>
        </section>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxiYhK3NjKzzyK0D4iXsoJlnB9E6BWvzSp9W9AXNQ6m6Yjf8AF1ktvTpxW475vesPiAFw/exec";
        const KEY_DATA = "FB_CHAT_DYN_v9_BADGE";
        let messages = [];
        let userName = localStorage.getItem('fb_user_v2') || "";
        let currentRoom = "ALL";
        let renderedMsgIds = new Set();
        let seenMsgIds = new Set(); 
        let isInitialSync = true;   
        let unreadCounts = new Map();
        let historyUsers = new Set(JSON.parse(localStorage.getItem('fb_history_users') || "[]"));
        let onlineUsers = new Set();
        let isSyncing = false;
        let previewTimer = null;
        let originalTitle = document.title;
        let flashInterval = null;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-active');
            document.getElementById('overlay').classList.toggle('hidden');
            document.getElementById('menu-dot').classList.add('hidden');
            stopTitleFlash();
        }

        function switchRoom(room) {
            if (currentRoom === room) return;
            currentRoom = room;
            unreadCounts.set(room, 0);
            updateBadges();
            document.getElementById('active-room-title').innerText = room === "ALL" ? "全體廣播 / 全員" : "私聊: "+room;
            renderedMsgIds.clear(); 
            document.getElementById('chat-messages').innerHTML = "";
            updateUI(messages);
            if (window.innerWidth < 1024) toggleSidebar();
        }

        async function sync() {
            if (isSyncing) return;
            isSyncing = true;
            try {
                const res = await fetch(`${GAS_URL}?user=${encodeURIComponent(userName)}&t=${Date.now()}`);
                const cloud = await res.json();
                if (cloud && cloud[KEY_DATA]) {
                    processData(cloud[KEY_DATA]);
                    updateUI(cloud[KEY_DATA]);
                    isInitialSync = false; 
                }
                updateOnlineStatus(cloud);
                document.getElementById('sync-status').innerHTML = `<div class="online-dot animate-pulse"></div> 已同步 / 同期済み`;
            } catch (e) {
                document.getElementById('sync-status').innerHTML = `<div class="online-dot bg-red-400"></div> 連線異常`;
            } finally { isSyncing = false; }
        }

        function processData(newList) {
            let userListChanged = false;
            newList.forEach(m => {
                const id = m.time + m.user;
                if (m.user && m.user !== userName && !historyUsers.has(m.user)) { historyUsers.add(m.user); userListChanged = true; }
                if (m.to && m.to !== "ALL" && m.to !== userName && !historyUsers.has(m.to)) { historyUsers.add(m.to); userListChanged = true; }

                if (!seenMsgIds.has(id)) {
                    const room = (!m.to || m.to === "ALL") ? "ALL" : (m.user === userName ? null : m.user);
                    if (room && room !== currentRoom && m.user !== userName) {
                        if (!isInitialSync) {
                            unreadCounts.set(room, (unreadCounts.get(room) || 0) + 1);
                            triggerAlert(m.user);
                        }
                    }
                    seenMsgIds.add(id);
                }
            });
            if (userListChanged) saveHistoryUsers();
            updateBadges();
        }

        function saveHistoryUsers() { localStorage.setItem('fb_history_users', JSON.stringify(Array.from(historyUsers))); renderDMList(); }
        
        function clearHistoryUsers() { if(confirm("確定要清空通訊錄嗎？")) { historyUsers = new Set(); saveHistoryUsers(); } }

        function triggerAlert(sender) {
            const banner = document.getElementById('noti-banner');
            banner.innerText = `🔔 ${sender} 傳送了新訊息！`;
            banner.classList.add('active');
            setTimeout(() => banner.classList.remove('active'), 5000);
            document.getElementById('menu-dot').classList.remove('hidden');
            startTitleFlash();
        }

        function startTitleFlash() { if (flashInterval) return; flashInterval = setInterval(() => { document.title = (document.title===originalTitle) ? "🔔 新訊息！" : originalTitle; }, 800); }
        function stopTitleFlash() { clearInterval(flashInterval); flashInterval = null; document.title = originalTitle; }

        function updateBadges() {
            const allBadge = document.getElementById('unread-ALL');
            const count = unreadCounts.get('ALL') || 0;
            allBadge.innerText = count;
            count > 0 ? allBadge.classList.remove('hidden') : allBadge.classList.add('hidden');
            renderDMList();
        }

        function updateOnlineStatus(cloud) {
            const newOnline = new Set();
            let changed = false;
            Object.keys(cloud).forEach(k => {
                if (k.startsWith("PRES_v2_")) {
                    const u = k.replace("PRES_v2_", "");
                    if (Date.now() - cloud[k] < 60000) {
                        newOnline.add(u);
                        if (u !== userName && !historyUsers.has(u)) { historyUsers.add(u); changed = true; }
                    }
                }
            });
            onlineUsers = newOnline;
            if (changed) saveHistoryUsers();
            renderDMList();
        }

        function renderDMList() {
            const list = document.getElementById('dm-list');
            let html = "";
            const sortedUsers = Array.from(historyUsers).sort((a,b) => {
                const aOn = onlineUsers.has(a); const bOn = onlineUsers.has(b);
                if (aOn && !bOn) return -1; if (!aOn && bOn) return 1; return a.localeCompare(b);
            });
            sortedUsers.forEach(u => {
                if (u === userName) return;
                const isOnline = onlineUsers.has(u); const unread = unreadCounts.get(u) || 0;
                html += `
                    <div onclick="switchRoom('${u}')" id="room-${u}" class="room-item p-4 flex justify-between items-center cursor-pointer rounded-2xl transition-all ${currentRoom === u ? 'active font-bold' : ''}">
                        <div class="flex items-center">
                            <span class="online-status ${isOnline ? 'status-online' : 'status-offline'}"></span>
                            <span class="text-sm font-bold ${isOnline ? 'text-slate-800' : 'text-slate-400'}">${u}</span>
                        </div>
                        ${unread > 0 ? `<span class="unread-badge animate-pulse">${unread}</span>` : ''}
                    </div>`;
            });
            list.innerHTML = html || "<div class='text-[10px] text-slate-300 p-4 text-center'>尚未開始對話</div>";
        }

        function updateUI(newList) {
            const container = document.getElementById('chat-messages');
            const filtered = newList.filter(m => currentRoom === "ALL" ? (!m.to || m.to === "ALL") : ((m.user === userName && m.to === currentRoom) || (m.user === currentRoom && m.to === userName)));
            let added = false;
            filtered.forEach(m => {
                const id = m.time + m.user;
                if (renderedMsgIds.has(id)) return;
                const isMe = m.user === userName;
                const div = document.createElement('div');
                div.className = `flex ${isMe ? 'justify-end' : 'justify-start'} animate-fadeIn`;
                div.innerHTML = `<div class="p-4 rounded-2xl shadow-sm border ${isMe ? 'bg-blue-600 text-white border-blue-500' : 'bg-white text-slate-700 border-slate-100'}">
                                    <div class="text-[9px] font-black opacity-60 mb-1 leading-none uppercase tracking-tighter">${m.user}</div>
                                    <div class="text-sm font-bold tracking-tight py-1">${m.text}</div>
                                    <div class="text-[10px] mt-2 italic border-t pt-2 ${isMe?'border-white/20':'border-slate-50 text-blue-500'}">${m.trans || ""}</div>
                                 </div>`;
                container.appendChild(div);
                renderedMsgIds.add(id);
                added = true;
            });
            if (added) container.scrollTop = container.scrollHeight;
            messages = newList;
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input'); const text = input.value.trim(); if (!text) return;
            try {
                const isJp = /[\u3040-\u309F\u30A0-\u30FF]/.test(text);
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${isJp?'zh-TW':'ja'}&dt=t&q=${encodeURIComponent(text)}`);
                const json = await res.json();
                const trans = json[0].map(p => p[0]).join('');
                const msg = { user: userName, text, trans, time: Date.now(), to: currentRoom };
                updateUI([...messages, msg]); input.value = ""; input.style.height = "auto";
                document.getElementById('trans-preview').classList.add('hidden');
                fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ id: KEY_DATA, data: msg }), headers: { "Content-Type": "text/plain;charset=utf-8" } });
            } catch (e) { alert("發送失敗"); }
        }

        async function handlePreview() {
            const el = document.getElementById('msg-input'); const text = el.value.trim();
            el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px';
            if (!text) { document.getElementById('trans-preview').classList.add('hidden'); return; }
            clearTimeout(previewTimer);
            previewTimer = setTimeout(async () => {
                const isJp = /[\u3040-\u309F\u30A0-\u30FF]/.test(text);
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${isJp?'zh-TW':'ja'}&dt=t&q=${encodeURIComponent(text)}`);
                const json = await res.json();
                document.getElementById('trans-preview-text').innerText = "翻譯預覽: " + json[0].map(p => p[0]).join('');
                document.getElementById('trans-preview').classList.remove('hidden');
            }, 400);
        }

        function initUser() {
            document.getElementById('my-name-display').innerText = userName;
            sync(); setInterval(sync, 6000);
            setInterval(() => { if(userName) fetch(GAS_URL, {method:'POST', body:JSON.stringify({id:"PRES_v2_"+userName, data:Date.now()}), headers:{"Content-Type":"text/plain;charset=utf-8"}}); }, 10000);
        }

        function saveNameFromModal() {
            const val = document.getElementById('modal-user-name').value.trim();
            if (!val) return; userName = val; localStorage.setItem('fb_user_v2', userName);
            document.getElementById('name-modal').classList.add('hidden'); initUser();
        }

        function promptNameChange() {
            const n = prompt("輸入新姓名", userName);
            if(n && n.trim()){ localStorage.setItem('fb_user_v2', n.trim()); location.reload(); }
        }

        if (userName) initUser(); else document.getElementById('name-modal').classList.remove('hidden');
        document.getElementById('msg-input').onkeydown = (e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
    </script>
</body>
</html>
