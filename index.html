<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Chat V3.5.8 PRO - 終極穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg-glass: rgba(255, 255, 255, 0.98); }
        body { font-family: 'Outfit', 'Microsoft JhengHei', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%); height: 100vh; overflow: hidden; margin: 0; }
        .glass-panel { background: var(--bg-glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.7); box-shadow: 0 15px 60px -15px rgba(0, 0, 0, 0.08); }
        
        .msg-bubble { 
            width: fit-content !important; 
            max-width: 85%; 
            animation: fadeIn 0.3s ease-out; 
            word-break: break-all; 
            overflow-wrap: anywhere; 
            white-space: pre-wrap;
            display: flex;
            flex-direction: column;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 4000; }
        .sidebar-active { transform: translateX(0) !important; }
        .room-item.active { background: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; }
        .online-status { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .status-offline { background: #cbd5e1; }
        
        #noti-banner { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 12px 24px; border-radius: 99px; font-weight: bold; font-size: 14px; z-index: 6000; transition: all 0.5s; box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3); cursor: pointer; }
        #noti-banner.active { top: 20px; }
        .unread-badge { background: #ef4444; color: white; font-size: 9px; padding: 2px 6px; border-radius: 99px; font-weight: 900; }
        .lang-btn { flex: 1; padding: 10px; text-align: center; font-weight: bold; font-size: 12px; transition: all 0.3s; border-radius: 12px; }
        .lang-btn.active { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="flex items-center justify-center p-0 lg:p-4 overflow-hidden">

    <div id="noti-banner" onclick="this.classList.remove('active')">🔔</div>
    <div id="overlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[3500] hidden" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed left-0 top-0 bottom-0 w-72 bg-white border-r -translate-x-full shadow-2xl flex flex-col">
        <div class="p-8 border-b flex justify-between items-center bg-white sticky top-0">
            <h2 id="ui-sidebar-title" class="text-xl font-black text-slate-800 flex items-center gap-2"><span>💬</span> 成員名單</h2>
        </div>
        
        <div class="flex-1 overflow-y-auto py-2 scrollbar-hide">
            <div onclick="switchRoom('ALL')" id="room-ALL" class="room-item p-5 flex items-center justify-between cursor-pointer active font-bold">
                <div class="flex items-center gap-4">
                    <span class="text-lg">🌍</span>
                    <div id="ui-global-room" class="text-sm">全體廣播</div>
                </div>
                <div id="unread-ALL" class="unread-badge hidden">0</div>
            </div>
            
            <div class="px-6 py-4 mt-4 border-t">
                <h3 class="text-[10px] font-black text-slate-300 uppercase mb-4 tracking-widest flex justify-between items-center">
                    <span id="ui-contact-title">私密通訊錄</span>
                    <button onclick="clearHistoryUsers()" id="ui-clear-btn" class="hover:text-red-400">清空</button>
                </h3>
                <div id="dm-list" class="space-y-1"></div>
            </div>
        </div>

        <div class="p-4 mx-4 mb-4 bg-slate-50 rounded-2xl flex gap-1 border">
            <button onclick="setLang('zh')" id="lang-zh" class="lang-btn">中文</button>
            <button onclick="setLang('jp')" id="lang-jp" class="lang-btn">日本語</button>
        </div>

        <div class="p-6 border-t bg-slate-50 flex items-center justify-between">
            <div>
                <div id="my-name-display" class="text-xs font-black text-slate-800 uppercase leading-none">...</div>
                <div id="ui-my-account" class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter mt-1">My Account</div>
            </div>
            <button onclick="promptNameChange()" id="ui-rename-btn" class="px-3 py-1.5 bg-white border rounded-lg text-xs font-bold shadow-sm">更名</button>
        </div>
    </aside>

    <div id="name-modal" class="fixed inset-0 flex items-center justify-center p-4 hidden z-[5000] bg-slate-100/80 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl space-y-8 text-center border">
            <h2 id="ui-modal-title" class="text-2xl font-black text-slate-800">歡迎登入</h2>
            <input type="text" id="modal-user-name" placeholder="..." class="w-full bg-slate-50 border-2 rounded-2xl px-6 py-4 text-center text-lg font-bold outline-none focus:border-blue-500">
            <button onclick="saveNameFromModal()" id="ui-modal-btn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-lg shadow-xl hover:bg-blue-700 transition-all">進入</button>
        </div>
    </div>

    <div id="main-frame" class="w-full max-w-6xl h-full flex flex-col glass-panel rounded-none lg:rounded-[3rem] overflow-hidden relative border border-white/60">
        <header class="p-4 lg:p-6 border-b flex justify-between items-center bg-white/60">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" id="menu-btn" class="w-12 h-12 flex items-center justify-center bg-white border text-slate-600 rounded-2xl shadow-sm relative transition-all active:scale-95">
                    ☰
                    <div id="menu-dot" class="absolute -top-1 -right-1 w-3.5 h-3.5 bg-red-500 rounded-full border-2 border-white hidden"></div>
                </button>
                <div>
                    <h1 class="text-lg font-black text-slate-800" id="active-room-title">...</h1>
                    <div id="sync-status-container" class="text-[9px] font-bold text-slate-400 mt-0.5 flex items-center gap-1 uppercase tracking-tighter">
                        <div class="online-dot online-status grayscale opacity-50"></div> <span id="ui-sync-text">連線中...</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button id="ui-clear-global-btn" onclick="clearGlobalHistory()" class="text-[10px] font-bold text-red-500 border border-red-200 px-3 py-1 rounded-lg hover:bg-red-50 hidden">清空全體紀錄</button>
                <div class="bg-blue-600 text-white px-2 py-0.5 rounded text-[10px] font-black tracking-widest uppercase shadow-lg">V3.5.8</div>
            </div>
        </header>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 lg:p-10 space-y-4 scrollbar-hide"></div>

        <section class="p-4 lg:p-6 bg-white border-t backdrop-blur-md">
            <div id="trans-preview" class="mb-3 px-4 py-2 bg-slate-800 text-white rounded-xl text-[11px] font-bold hidden animate-fadeIn shadow-lg text-lg">
                <span id="ui-preview-label" class="text-blue-400">翻譯預覽: </span> <span id="trans-preview-text">...</span>
            </div>
            <div class="flex gap-4 items-end bg-slate-100/50 rounded-[2rem] p-3 border focus-within:bg-white transition-all">
                <textarea id="msg-input" oninput="handlePreview()" class="flex-1 bg-transparent border-none outline-none p-3 text-xl font-bold text-slate-700 resize-none max-h-32 min-h-[56px]" placeholder="..."></textarea>
                <button onclick="sendMessage()" id="send-btn" class="w-14 h-14 bg-blue-600 text-white rounded-[1.2rem] flex items-center justify-center shadow-lg hover:bg-blue-700 active:scale-95 transition-all">➤</button>
            </div>
        </section>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxiYhK3NjKzzyK0D4iXsoJlnB9E6BWvzSp9W9AXNQ6m6Yjf8AF1ktvTpxW475vesPiAFw/exec";
        const KEY_DATA = "FB_CHAT_DYN_v9_BADGE";
        
        const UI = {
            zh: {
                sidebarTitle: "成員名單", globalRoom: "全體廣播", contactTitle: "私密通訊錄", clearBtn: "清空", 
                myAccount: "我的帳號", renameBtn: "更名", modalTitle: "歡迎登入", modalBtn: "進入聊天室", 
                modalPlaceholder: "您的名字", syncLoading: "連線中...", syncDone: "已同步", offline: "斷線", 
                previewLabel: "翻譯預覽: ", inputPlaceholder: "輸入訊息...", notice: "傳送了新訊息！", 
                confirmClear: "確定要清空嗎？", confirmClearGlobal: "確定要清除全體紀錄嗎？", clearGlobal: "清空全體紀錄", failSend: "發送失敗"
            },
            jp: {
                sidebarTitle: "メンバー", globalRoom: "全体放送", contactTitle: "ダイレクトメッセージ", clearBtn: "消去", 
                myAccount: "マイアカウント", renameBtn: "名前変更", modalTitle: "ログイン", modalBtn: "入室する", 
                modalPlaceholder: "お名前", syncLoading: "接続中...", syncDone: "同期済み", offline: "オフライン", 
                previewLabel: "翻譯プレビュー: ", inputPlaceholder: "メッセージを入力...", notice: "がメッセージを送信しました！", 
                confirmClear: "履歴を削除しますか？", confirmClearGlobal: "全体記録を削除しますか？", clearGlobal: "履歴全消去", failSend: "送信失敗"
            }
        };

        let messages = [];
        let userName = localStorage.getItem('fb_user_v2') || "";
        let currentLang = localStorage.getItem('fb_ui_lang') || "zh";
        let currentRoom = "ALL";
        let renderedMsgIds = new Set();
        let seenMsgIds = new Set(); 
        let isInitialSync = true;   
        let unreadCounts = new Map();
        let historyUsers = new Set(JSON.parse(localStorage.getItem('fb_history_users') || "[]"));
        let onlineUsers = new Set();
        let isSyncing = false;
        let previewTimer = null;
        let originalTitle = document.title;
        let flashInterval = null;

        function setLang(lang) {
            currentLang = lang; localStorage.setItem('fb_ui_lang', lang); applyUI();
        }

        function applyUI() {
            const s = UI[currentLang] || UI.zh;
            document.getElementById('ui-sidebar-title').innerText = s.sidebarTitle;
            document.getElementById('ui-global-room').innerText = s.globalRoom;
            document.getElementById('ui-contact-title').innerText = s.contactTitle;
            document.getElementById('ui-clear-btn').innerText = s.clearBtn;
            document.getElementById('ui-my-account').innerText = s.myAccount;
            document.getElementById('ui-rename-btn').innerText = s.renameBtn;
            document.getElementById('ui-modal-title').innerText = s.modalTitle;
            document.getElementById('ui-modal-btn').innerText = s.modalBtn;
            document.getElementById('modal-user-name').placeholder = s.modalPlaceholder;
            document.getElementById('ui-preview-label').innerText = s.previewLabel;
            document.getElementById('msg-input').placeholder = s.inputPlaceholder;
            document.getElementById('ui-clear-global-btn').innerText = s.clearGlobal;
            
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById('lang-' + currentLang);
            if (activeBtn) activeBtn.classList.add('active');
            updateRoomTitle(); renderDMList();
        }

        function updateRoomTitle() {
            const s = UI[currentLang] || UI.zh;
            const clearBtn = document.getElementById('ui-clear-global-btn');
            if (currentRoom === "ALL") {
                document.getElementById('active-room-title').innerText = s.globalRoom;
                clearBtn.classList.remove('hidden');
            } else {
                document.getElementById('active-room-title').innerText = (currentLang==='zh'?'私聊: ':'DM: ') + currentRoom;
                clearBtn.classList.add('hidden');
            }
        }

        async function sync() {
            if (isSyncing || !userName) return;
            isSyncing = true;
            try {
                const res = await fetch(`${GAS_URL}?user=${encodeURIComponent(userName)}&v=358&t=${Date.now()}`);
                const cloud = await res.json();
                if (cloud && cloud[KEY_DATA]) {
                    processData(cloud[KEY_DATA]);
                    updateUI(cloud[KEY_DATA]);
                    isInitialSync = false; 
                }
                updateOnlineStatus(cloud);
                document.getElementById('ui-sync-text').innerText = (UI[currentLang] || UI.zh).syncDone;
                document.querySelector('.online-dot').classList.add('status-online', 'animate-pulse');
            } catch (e) {
                document.getElementById('ui-sync-text').innerText = (UI[currentLang] || UI.zh).offline;
                document.querySelector('.online-dot').classList.remove('status-online');
            } finally { isSyncing = false; }
        }

        function processData(newList) {
            let changed = false;
            newList.forEach(m => {
                const id = m.time + m.user;
                if (m.user && m.user !== userName && !historyUsers.has(m.user)) { historyUsers.add(m.user); changed = true; }
                if (m.to && m.to !== "ALL" && m.to !== userName && !historyUsers.has(m.to)) { historyUsers.add(m.to); changed = true; }
                if (!seenMsgIds.has(id)) {
                    const room = (!m.to || m.to === "ALL") ? "ALL" : (m.user === userName ? null : m.user);
                    if (room && room !== currentRoom && m.user !== userName && !isInitialSync) {
                        unreadCounts.set(room, (unreadCounts.get(room) || 0) + 1);
                        triggerAlert(m.user);
                    }
                    seenMsgIds.add(id);
                }
            });
            if (changed) saveHistoryUsers();
            updateBadges();
        }

        function updateUI(newList) {
            const container = document.getElementById('chat-messages');
            if (!container) return;
            const filtered = newList.filter(m => currentRoom === "ALL" ? (!m.to || m.to === "ALL") : ((m.user === userName && m.to === currentRoom) || (m.user === currentRoom && m.to === userName)));
            let added = false;
            filtered.forEach(m => {
                const id = m.time + m.user;
                if (renderedMsgIds.has(id)) return;
                const isMe = m.user === userName;
                const div = document.createElement('div');
                div.className = `flex ${isMe ? 'justify-end' : 'justify-start'} animate-fadeIn`;
                div.innerHTML = `
                    <div class="msg-bubble px-4 py-3 rounded-[1.2rem] shadow-sm border ${isMe ? 'bg-blue-600 text-white border-blue-500' : 'bg-white text-slate-800 border-slate-100'}">
                        <div class="text-base font-black ${isMe?'text-blue-100':'text-slate-900'} mb-1 leading-none uppercase tracking-tighter">${m.user}</div>
                        <div class="text-xl font-bold tracking-tight py-1 leading-snug">${m.text}</div>
                        <div class="text-base mt-2 pt-2 border-t font-medium ${isMe?'border-white/20 text-blue-100':'border-slate-50 text-blue-600'}">${m.trans || ""}</div>
                    </div>`;
                container.appendChild(div);
                renderedMsgIds.add(id); added = true;
            });
            if (added) container.scrollTop = container.scrollHeight;
            messages = newList;
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input'); const text = input.value.trim();
            if (!text || !userName) return;
            const btn = document.getElementById('send-btn');
            btn.disabled = true; btn.innerText = "⏳";
            
            let trans = "";
            try {
                const isJp = /[\u3040-\u309F\u30A0-\u30FF]/.test(text);
                const tRes = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${isJp?'zh-TW':'ja'}&dt=t&q=${encodeURIComponent(text)}`);
                const tJson = await tRes.json();
                trans = tJson[0].map(p => p[0]).join('');
            } catch (e) { console.warn("Translation failed"); trans = ""; }

            try {
                const msg = { user: userName, text, trans, time: Date.now(), to: currentRoom };
                
                // 樂觀發送：先顯示
                updateUI([...messages, msg]);
                input.value = ""; input.style.height = "auto";
                document.getElementById('trans-preview').classList.add('hidden');

                // 傳送給伺服器
                const res = await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ id: KEY_DATA, data: msg }), 
                    headers: { "Content-Type": "text/plain;charset=utf-8" } 
                });
                if (!res.ok) throw new Error("POST Failed");
                sync();
            } catch (e) {
                alert((UI[currentLang] || UI.zh).failSend);
            } finally {
                btn.disabled = false; btn.innerText = "➤";
            }
        }

        function switchRoom(room) {
            if (currentRoom === room) return;
            currentRoom = room; unreadCounts.set(room, 0);
            updateBadges(); updateRoomTitle();
            renderedMsgIds.clear(); document.getElementById('chat-messages').innerHTML = "";
            updateUI(messages);
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function triggerAlert(sender) {
            const banner = document.getElementById('noti-banner');
            banner.innerText = `🔔 ${sender} ${(UI[currentLang]||UI.zh).notice}`;
            banner.classList.add('active');
            setTimeout(() => banner.classList.remove('active'), 5000);
            document.getElementById('menu-dot').classList.remove('hidden');
            startTitleFlash();
        }

        function startTitleFlash() { 
            if (flashInterval) return; 
            const msg = currentLang === 'zh' ? "🔔 新訊息！" : "🔔 新着メッセージ！";
            flashInterval = setInterval(() => { document.title = (document.title===originalTitle) ? msg : originalTitle; }, 800); 
        }
        function stopTitleFlash() { clearInterval(flashInterval); flashInterval = null; document.title = originalTitle; }

        function updateBadges() {
            const allBadge = document.getElementById('unread-ALL');
            allBadge.innerText = unreadCounts.get('ALL') || 0;
            (unreadCounts.get('ALL') || 0) > 0 ? allBadge.classList.remove('hidden') : allBadge.classList.add('hidden');
            renderDMList();
        }

        function updateOnlineStatus(cloud) {
            const newOnline = new Set();
            Object.keys(cloud).forEach(k => {
                if (k.startsWith("PRES_v2_")) {
                    const u = k.replace("PRES_v2_", "");
                    if (Date.now() - cloud[k] < 60000) newOnline.add(u);
                }
            });
            onlineUsers = newOnline; renderDMList();
        }

        function renderDMList() {
            const list = document.getElementById('dm-list');
            let html = "";
            const sortedUsers = Array.from(historyUsers).sort((a,b) => {
                const aOn = onlineUsers.has(a); const bOn = onlineUsers.has(b);
                if (aOn && !bOn) return -1; if (!aOn && bOn) return 1; return a.localeCompare(b);
            });
            sortedUsers.forEach(u => {
                if (u === userName) return;
                const isOnline = onlineUsers.has(u); const unread = unreadCounts.get(u) || 0;
                html += `<div onclick="switchRoom('${u}')" id="room-${u}" class="room-item p-4 flex justify-between items-center cursor-pointer rounded-2xl transition-all ${currentRoom === u ? 'active font-bold' : ''}">
                    <div class="flex items-center">
                        <span class="online-status ${isOnline ? 'status-online' : 'status-offline'}"></span>
                        <span class="text-sm font-bold ${isOnline ? 'text-slate-800' : 'text-slate-400'}">${u}</span>
                    </div>
                    ${unread > 0 ? `<span class="unread-badge animate-bounce">${unread}</span>` : ''}
                </div>`;
            });
            list.innerHTML = html || `<div class='text-[10px] text-slate-300 p-4 text-center'>...</div>`;
        }

        async function handlePreview() {
            const el = document.getElementById('msg-input'); const text = el.value.trim();
            el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px';
            if (!text) { document.getElementById('trans-preview').classList.add('hidden'); return; }
            clearTimeout(previewTimer);
            previewTimer = setTimeout(async () => {
                try {
                const isJp = /[\u3040-\u309F\u30A0-\u30FF]/.test(text);
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${isJp?'zh-TW':'ja'}&dt=t&q=${encodeURIComponent(text)}`);
                const json = await res.json();
                document.getElementById('trans-preview-text').innerText = json[0].map(p => p[0]).join('');
                document.getElementById('trans-preview').classList.remove('hidden');
                } catch(e) {}
            }, 400);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-active');
            document.getElementById('overlay').classList.toggle('hidden');
            document.getElementById('menu-dot').classList.add('hidden');
            stopTitleFlash();
        }

        async function clearGlobalHistory() {
            if (!confirm((UI[currentLang]||UI.zh).confirmClearGlobal)) return;
            try {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ mode: 'clear', id: KEY_DATA }), headers: { "Content-Type": "text/plain;charset=utf-8" } });
                messages = []; renderedMsgIds.clear(); document.getElementById('chat-messages').innerHTML = ""; sync();
            } catch (e) { alert("ERROR"); }
        }

        function promptNameChange() {
            const n = prompt("輸入新姓名", userName);
            if(n && n.trim()){ localStorage.setItem('fb_user_v2', n.trim()); location.reload(); }
        }

        function saveNameFromModal() {
            const val = document.getElementById('modal-user-name').value.trim();
            if (!val) return; userName = val; localStorage.setItem('fb_user_v2', userName);
            document.getElementById('name-modal').classList.add('hidden'); initUser();
        }

        function initUser() {
            document.getElementById('my-name-display').innerText = userName;
            applyUI(); sync(); setInterval(sync, 6000);
            setInterval(() => { if(userName) fetch(GAS_URL, {method:'POST', body:JSON.stringify({id:"PRES_v2_"+userName, data:Date.now()}), headers:{"Content-Type":"text/plain;charset=utf-8"}}); }, 10000);
        }

        function saveHistoryUsers() { localStorage.setItem('fb_history_users', JSON.stringify(Array.from(historyUsers))); renderDMList(); }
        function clearHistoryUsers() { if(confirm((UI[currentLang]||UI.zh).confirmClear)) { historyUsers = new Set(); saveHistoryUsers(); } }

        if (userName) initUser(); else { document.getElementById('name-modal').classList.remove('hidden'); applyUI(); }
        document.getElementById('msg-input').onkeydown = (e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
    </script>
</body>
</html>
