<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Chat V3.2 PRO Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg-glass: rgba(255, 255, 255, 0.98); }
        body { font-family: 'Outfit', 'Microsoft JhengHei', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%); height: 100vh; overflow: hidden; margin: 0; }
        .glass-panel { background: var(--bg-glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.7); box-shadow: 0 15px 60px -15px rgba(0, 0, 0, 0.08); }
        .message-bubble { max-width: 85%; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        #name-modal { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); z-index: 2000; }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; margin-right: 6px; }
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 3000; }
        .sidebar-active { transform: translateX(0) !important; }
        .room-item.active { background: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; }
    </style>
</head>
<body class="flex items-center justify-center p-0 lg:p-4 overflow-hidden">

    <div id="overlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[2500] hidden" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 bottom-0 w-72 bg-white border-r -translate-x-full shadow-2xl flex flex-col">
        <div class="p-8 border-b">
            <h2 class="text-xl font-black text-slate-800 flex items-center gap-2"><span>💬</span> 頻道清單 / リスト</h2>
        </div>
        <div class="flex-1 overflow-y-auto py-4">
            <div onclick="switchRoom('ALL')" id="room-ALL" class="room-item p-5 flex items-center gap-4 cursor-pointer active font-bold">
                <span class="text-lg">🌍</span>
                <div class="text-sm">全體廣播 / 全員</div>
            </div>
            <div class="px-6 py-4">
                <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-2">在線成員 / メンバー</h3>
                <div id="dm-list" class="space-y-1"></div>
            </div>
        </div>
        <div class="p-6 border-t bg-slate-50">
            <div class="flex items-center justify-between">
                <div>
                    <div id="my-name-display" class="text-xs font-black text-slate-800 uppercase">...</div>
                    <div class="text-[9px] text-slate-400 font-bold">MY ACCOUNT</div>
                </div>
                <button onclick="promptNameChange()" class="p-2 bg-white border rounded-lg shadow-sm hover:bg-white active:scale-95 transition-all text-xs">👤 修改</button>
            </div>
        </div>
    </aside>

    <!-- Name Modal -->
    <div id="name-modal" class="fixed inset-0 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl space-y-8 border">
            <div class="text-center">
                <h2 class="text-2xl font-black">歡迎進入聊天室</h2>
                <p class="text-xs text-blue-500 font-bold uppercase mt-1">Welcome / ログイン</p>
            </div>
            <input type="text" id="modal-user-name" placeholder="您的名字 / お名前" class="w-full bg-slate-50 border-2 rounded-2xl px-6 py-4 text-lg font-bold outline-none focus:border-blue-500 text-center">
            <button onclick="saveNameFromModal()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-lg shadow-xl hover:bg-blue-700">進入對話 / 参加する</button>
        </div>
    </div>

    <div id="main-frame" class="w-full max-w-6xl h-full flex flex-col glass-panel rounded-none lg:rounded-[3rem] overflow-hidden relative">
        <header class="p-4 lg:p-6 border-b flex justify-between items-center bg-white/60">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="w-12 h-12 flex items-center justify-center bg-white border text-slate-600 rounded-2xl shadow-sm hover:bg-slate-50">☰</button>
                <div>
                    <h1 class="text-lg font-black text-slate-800" id="active-room-title">全體廣播 / 全員</h1>
                    <div id="sync-status" class="text-[9px] font-bold text-slate-400 mt-0.5 flex items-center gap-1">
                        <div class="online-dot grayscale opacity-50"></div> 連線中...
                    </div>
                </div>
            </div>
            <span class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded text-[9px] font-black">V3.2 PRO FINAL</span>
        </header>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 lg:p-10 space-y-4 scrollbar-hide"></div>

        <section class="p-4 lg:p-6 bg-white/90 border-t backdrop-blur-md">
            <div class="flex gap-4 items-end bg-slate-100/50 rounded-[2rem] p-3 border focus-within:bg-white transition-all">
                <textarea id="msg-input" class="flex-1 bg-transparent border-none outline-none p-3 text-base font-bold text-slate-700 resize-none max-h-32 min-h-[56px]" placeholder="輸入訊息 / メッセージを入力..."></textarea>
                <button onclick="sendMessage()" class="w-14 h-14 bg-blue-600 text-white rounded-[1.2rem] flex items-center justify-center shadow-lg hover:bg-blue-700">➤</button>
            </div>
        </section>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxiYhK3NjKzzyK0D4iXsoJlnB9E6BWvzSp9W9AXNQ6m6Yjf8AF1ktvTpxW475vesPiAFw/exec";
        const KEY_DATA = "FB_CHAT_DYN_v9_BADGE";
        let messages = [];
        let userName = localStorage.getItem('fb_user_v2') || "";
        let currentRoom = "ALL";
        let renderedMsgIds = new Set();
        let isSyncing = false;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-active');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function switchRoom(room) {
            if (currentRoom === room) return;
            currentRoom = room;
            document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active', 'font-bold'));
            document.getElementById(room === "ALL" ? "room-ALL" : "room-"+room)?.classList.add('active', 'font-bold');
            document.getElementById('active-room-title').innerText = room === "ALL" ? "全體廣播 / 全員" : "私聊: "+room;
            renderedMsgIds.clear();
            document.getElementById('chat-messages').innerHTML = "";
            updateUI(messages);
            if (window.innerWidth < 1024) toggleSidebar();
        }

        async function sync() {
            if (isSyncing) return;
            isSyncing = true;
            try {
                const res = await fetch(`${GAS_URL}?user=${encodeURIComponent(userName)}&t=${Date.now()}`);
                const cloud = await res.json();
                if (cloud && cloud[KEY_DATA]) updateUI(cloud[KEY_DATA]);
                updateOnlineList(cloud);
                document.getElementById('sync-status').innerHTML = `<div class="online-dot animate-pulse"></div> 已同步 / 同期済み`;
            } catch (e) {
                document.getElementById('sync-status').innerHTML = `<div class="online-dot bg-red-400"></div> 連線異常`;
            } finally {
                isSyncing = false;
            }
        }

        function updateUI(newList) {
            const container = document.getElementById('chat-messages');
            const filtered = newList.filter(m => currentRoom === "ALL" ? (!m.to || m.to === "ALL") : ((m.user === userName && m.to === currentRoom) || (m.user === currentRoom && m.to === userName)));
            filtered.forEach(m => {
                const id = m.time + m.user;
                if (renderedMsgIds.has(id)) return;
                const isMe = m.user === userName;
                const div = document.createElement('div');
                div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                div.innerHTML = `<div class="message-bubble p-4 rounded-2xl ${isMe ? 'bg-blue-600 text-white' : 'bg-white border text-slate-700 shadow-sm'}">
                                    <div class="text-[9px] font-black opacity-60 mb-1 uppercase">${m.user}</div>
                                    <div class="text-sm font-bold tracking-tight">${m.text}</div>
                                    <div class="text-[10px] mt-2 italic border-t pt-2 ${isMe ? 'border-white/20' : 'border-slate-50 text-blue-500'}">${m.trans || ""}</div>
                                 </div>`;
                container.appendChild(div);
                renderedMsgIds.add(id);
            });
            if (filtered.length > 0) container.scrollTop = container.scrollHeight;
            messages = newList;
        }

        function updateOnlineList(cloud) {
            const list = document.getElementById('dm-list');
            const now = Date.now();
            let html = "";
            Object.keys(cloud).forEach(k => {
                if (k.startsWith("PRES_v2_")) {
                    const u = k.replace("PRES_v2_", "");
                    if (u !== userName && now - cloud[k] < 60000) {
                        html += `<div onclick="switchRoom('${u}')" id="room-${u}" class="room-item p-4 cursor-pointer rounded-xl border-b hover:bg-slate-50 transition-all font-bold text-sm ${currentRoom === u ? 'active' : ''}">${u}</div>`;
                    }
                }
            });
            list.innerHTML = html || "<div class='text-[10px] text-slate-300 p-4 text-center'>暫無其他在線成員</div>";
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            try {
                const isJp = /[\u3040-\u309F\u30A0-\u30FF]/.test(text);
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${isJp?'zh-TW':'ja'}&dt=t&q=${encodeURIComponent(text)}`);
                const json = await res.json();
                const trans = json[0].map(p => p[0]).join('');
                const msg = { user: userName, text, trans, time: Date.now(), to: currentRoom };
                updateUI([...messages, msg]);
                input.value = "";
                input.style.height = "auto";
                fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ id: KEY_DATA, data: msg }), headers: { "Content-Type": "text/plain;charset=utf-8" } });
            } catch (e) { alert("發送失敗"); }
        }

        function initUser() {
            document.getElementById('my-name-display').innerText = userName;
            sync();
            setInterval(sync, 6000);
            setInterval(() => { 
                if(userName) fetch(GAS_URL, {method:'POST', body:JSON.stringify({id:"PRES_v2_"+userName, data:Date.now()}), headers:{"Content-Type":"text/plain;charset=utf-8"}});
            }, 20000);
        }

        function saveNameFromModal() {
            const val = document.getElementById('modal-user-name').value.trim();
            if (!val) return;
            userName = val;
            localStorage.setItem('fb_user_v2', userName);
            document.getElementById('name-modal').classList.add('hidden');
            initUser();
        }

        function promptNameChange() {
            const n = prompt("輸入新姓名", userName);
            if(n && n.trim()){
                localStorage.setItem('fb_user_v2', n.trim());
                location.reload();
            }
        }

        if (userName) initUser(); else document.getElementById('name-modal').classList.remove('hidden');

        document.getElementById('msg-input').focus();
        document.getElementById('msg-input').onkeydown = (e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
    </script>
</body>
</html>
